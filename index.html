<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liberty Gad Susu Enterprise - Collector Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Roboto', sans-serif; background:#f5f7fa; margin:0; padding:20px; }
h1 { color:#34495e; text-align:center; margin-bottom:30px; }
h2, h3 { color:#2c3e50; margin-bottom:10px; }
section { background:white; padding:20px; margin-bottom:20px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
input, button { padding:8px 12px; margin:5px 0; border-radius:5px; border:1px solid #ccc; font-size:14px; }
button { background:#2980b9; color:white; border:none; cursor:pointer; transition:0.2s; }
button:hover { background:#3498db; }
table { width:100%; border-collapse: collapse; margin-top:10px; font-size:14px; }
th, td { border:1px solid #ddd; padding:8px; text-align:center; }
th { background:#2c3e50; color:white; cursor:pointer; }
tr:nth-child(even) { background:#f8f8f8; }
tr:hover { background:#f1f7ff; }
.penalty { color:#e74c3c; font-weight:bold; }
.eligible { color:#27ae60; font-weight:bold; }
.daily-total { font-weight:bold; background:#f39c12; color:white; }
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.card { margin-bottom:15px; }
.tooltip { position: relative; display: inline-block; cursor: pointer; }
.tooltip .tooltiptext { visibility: hidden; width: 120px; background-color: #2c3e50; color: #fff; text-align: center; padding:5px; border-radius:6px; position: absolute; z-index:1; bottom:125%; left:50%; margin-left:-60px; opacity:0; transition:opacity 0.3s; font-size:12px;}
.tooltip:hover .tooltiptext { visibility: visible; opacity:1; }
</style>
</head>
<body>

<h1>Liberty Gad Susu Enterprise - Collector Dashboard</h1>

<section class="card">
  <h3>Add New Member</h3>
  <input id="newMemberId" placeholder="ID Number">
  <input id="newMemberName" placeholder="Member Name">
  <input id="newMemberPhone" placeholder="Phone Number">
  <input id="newMemberRate" type="number" placeholder="Weekly Contribution (GHS)">
  <button onclick="addMember()">Add Member</button>
</section>

<section class="card">
  <h3>Search Members</h3>
  <input id="searchQuery" placeholder="Search by name or phone" oninput="loadMembers()">
</section>

<section class="card">
  <h3>Record Payment</h3>
  <input id="memberId" placeholder="Member ID">
  <input id="weeks" type="number" placeholder="Weeks Paid">
  <button onclick="recordPayment()">Record Payment</button>
</section>

<section id="result" class="card"></section>

<section class="card">
<h2>All Members</h2>
<table id="membersTable">
  <thead>
    <tr>
      <th onclick="sortTable(0)">ID</th>
      <th onclick="sortTable(1)">Member</th>
      <th>Phone</th>
      <th>Weekly Contribution</th>
      <th>Weeks Paid</th>
      <th>Weekly Marks</th>
      <th>Amount Today</th>
      <th>G.Total</th>
      <th>Penalty</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody></tbody>
  <tfoot>
    <tr class="daily-total">
      <td colspan="6">Daily Total</td>
      <td id="dailyTotalAmount">0</td>
      <td colspan="3"></td>
    </tr>
  </tfoot>
</table>
</section>

<script>
const backendURL = "https://liberty-gad-susu-backend.gadesesamuel35.workers.dev";

// Add Member
async function addMember() {
  const id = document.getElementById("newMemberId").value.trim();
  const name = document.getElementById("newMemberName").value.trim();
  const phone = document.getElementById("newMemberPhone").value.trim();
  const weeklyRate = Number(document.getElementById("newMemberRate").value);
  if(!id||!name||!phone||!weeklyRate){ alert("Fill all fields!"); return; }

  const res = await fetch(`${backendURL}/add-member`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({id,name,phone,weeklyRate})
  });
  const data = await res.json();
  if(data.success){ 
    alert("Member added successfully!"); 
    document.getElementById("newMemberId").value="";
    document.getElementById("newMemberName").value="";
    document.getElementById("newMemberPhone").value="";
    document.getElementById("newMemberRate").value="";
    loadMembers(); 
  } else alert(data.message);
}

// Delete Member
async function deleteMember(id){
  if(!confirm(`Delete member ${id}?`)) return;
  const res = await fetch(`${backendURL}/delete-member`,{
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({id})
  });
  const data = await res.json();
  if(data.success) loadMembers();
}

// Record Payment
async function recordPayment() {
  const id = document.getElementById("memberId").value.trim();
  const weeks = Number(document.getElementById("weeks").value);
  if(!id || !weeks){ alert("Fill all fields!"); return; }

  const res = await fetch(`${backendURL}/pay`,{
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({id,weeks})
  });
  const data = await res.json();
  if(!data.success){ alert(data.message); return; }

  document.getElementById("result").innerHTML = `
    <div class="tooltip">
      Payment Recorded ✅
      <span class="tooltiptext">Marks: ${data.mark}<br>Amount: GHS${data.amount}<br>Total: GHS${data.gTotal}</span>
    </div>
    <br>
    ${data.penalty ? '<span class="penalty">❌ No interest</span>' : '<span class="eligible">✅ Eligible for interest</span>'}
  `;
  loadMembers();
}

// Load Members
async function loadMembers() {
  const searchQuery = document.getElementById("searchQuery").value.toLowerCase();
  const res = await fetch(`${backendURL}/members`);
  const members = await res.json();

  const tbody = document.querySelector("#membersTable tbody");
  tbody.innerHTML="";
  let dailyTotal =0;

  members.filter(m=>m.name.toLowerCase().includes(searchQuery)||m.phone.includes(searchQuery)).forEach(m=>{
    const weeklyMarks = Object.entries(m.weeklyMarks||{}).sort((a,b)=>a[0]-b[0]).map(w=>`W${w[0]}:${w[1]}`).join(" | ");
    const weekNumbers = Object.keys(m.weeklyMarks||{}).map(Number);
    let amountToday =0;
    if(weekNumbers.length>0){
      const lastWeek=Math.max(...weekNumbers);
      amountToday = m.weeklyMarks[lastWeek].length * m.weeklyRate;
    }
    dailyTotal+=amountToday;
    const weekNumber = Math.floor((new Date().getTime()-new Date("2026-01-03").getTime())/(7*24*60*60*1000))+1;
    const missedWeeks = weekNumber - m.weeksPaid;
    const penaltyText = missedWeeks>=5 ? '<span class="penalty">❌ No interest</span>' : '<span class="eligible">✅ Eligible</span>';

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${m.id}</td>
      <td>${m.name}</td>
      <td>${m.phone}</td>
      <td>GHS${m.weeklyRate}</td>
      <td>${m.weeksPaid}</td>
      <td>${weeklyMarks}</td>
      <td>GHS${amountToday}</td>
      <td>GHS${m.gTotal}</td>
      <td>${penaltyText}</td>
      <td><button onclick="deleteMember('${m.id}')">Delete</button></td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById("dailyTotalAmount").innerText=`GHS${dailyTotal}`;
}

// Simple Table Sorting by Column
function sortTable(colIndex){
  const table=document.getElementById("membersTable");
  let switching=true,dir="asc";
  while(switching){
    switching=false;
    const rows=table.rows;
    for(let i=1;i<rows.length-2;i++){
      let shouldSwitch=false;
      let x=rows[i].getElementsByTagName("TD")[colIndex];
      let y=rows[i+1].getElementsByTagName("TD")[colIndex];
      if(dir==="asc" && x.innerText.toLowerCase()>y.innerText.toLowerCase()){ shouldSwitch=true; break;}
      if(dir==="desc" && x.innerText.toLowerCase()<y.innerText.toLowerCase()){ shouldSwitch=true; break;}
      if(shouldSwitch){ rows[i].parentNode.insertBefore(rows[i+1],rows[i]); switching=true;}
    }
    if(!switching && dir==="asc") dir="desc",switching=true;
  }
}

// Initial load
loadMembers();
</script>
</body>
</html>
