<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liberty Gad Susu Enterprise - Collector Dashboard</title>
<style>
body { font-family: Arial, sans-serif; margin:20px; background:#f9f9f9; }
h1, h2 { color:#2c3e50; }
table { width: 100%; border-collapse: collapse; margin-top:20px; background:white; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; }
th { background:#2c3e50; color:white; }
tr:nth-child(even) { background:#f2f2f2; }
input { padding:5px; margin:5px; }
button { padding:5px 10px; margin:5px; cursor:pointer; }
.penalty { color:red; font-weight:bold; }
.daily-total { font-weight:bold; background:#f39c12; color:white; }
</style>
</head>
<body>

<h1>Liberty Gad Susu Enterprise - Collector Dashboard</h1>

<div>
  <input id="member" placeholder="Member Name">
  <input id="phone" placeholder="Phone Number">
  <input id="weeks" type="number" placeholder="Weeks Paid">
  <button onclick="recordPayment()">Record Payment</button>
</div>

<div id="result"></div>

<h2>All Members</h2>
<table id="membersTable">
  <thead>
    <tr>
      <th>Member</th>
      <th>Phone</th>
      <th>Weeks Paid</th>
      <th>Weekly Marks</th>
      <th>Amount Today</th>
      <th>G.Total</th>
      <th>Penalty</th>
    </tr>
  </thead>
  <tbody></tbody>
  <tfoot>
    <tr class="daily-total">
      <td colspan="4">Daily Total</td>
      <td id="dailyTotalAmount">0</td>
      <td colspan="2"></td>
    </tr>
  </tfoot>
</table>

<script>
const backendURL = "https://liberty-gad-susu-backend.gadesesamuel35.workers.dev";

// Record Payment
async function recordPayment() {
  const member = document.getElementById("member").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const weeks = Number(document.getElementById("weeks").value);

  if(!member || !phone || !weeks) { alert("Fill all fields!"); return; }

  const res = await fetch(`${backendURL}/pay`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ member, phone, weeks })
  });

  const data = await res.json();

  document.getElementById("result").innerHTML = `
    Payment Recorded<br>
    Marks Today: ${data.mark}<br>
    Amount Today: GHS${data.amount}<br>
    G.Total: GHS${data.gTotal}<br>
    ${data.penalty ? '<span class="penalty">Penalty: Member not eligible for interest</span>' : 'Eligible for interest'}
  `;

  loadMembers();
}

// Load All Members
async function loadMembers() {
  const res = await fetch(`${backendURL}/members`);
  const members = await res.json();

  const tbody = document.querySelector("#membersTable tbody");
  tbody.innerHTML = "";

  let dailyTotal = 0;

  members.forEach(m => {
    const weeklyMarks = Object.entries(m.weeklyMarks || {})
                              .sort((a,b)=>a[0]-b[0])
                              .map(w=>`W${w[0]}:${w[1]}`).join(" | ");

    // Calculate amount today as last week's payment
    const weekNumbers = Object.keys(m.weeklyMarks || {}).map(Number);
    let amountToday = 0;
    if(weekNumbers.length > 0) {
      const lastWeek = Math.max(...weekNumbers);
      const marksCount = m.weeklyMarks[lastWeek].length;
      amountToday = marksCount * 50;
    }
    dailyTotal += amountToday;

    // Penalty: missed 5+ weeks
    const currentWeekNumber = new Date().getTime() - new Date("2026-01-03").getTime();
    const weekNumber = Math.floor(currentWeekNumber / (7*24*60*60*1000)) + 1;
    const missedWeeks = weekNumber - m.weeksPaid;
    const penaltyText = (missedWeeks >= 5) ? '<span class="penalty">❌ No interest</span>' : '✅ Eligible';

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${m.name}</td>
      <td>${m.phone}</td>
      <td>${m.weeksPaid}</td>
      <td>${weeklyMarks}</td>
      <td>GHS${amountToday}</td>
      <td>GHS${m.gTotal}</td>
      <td>${penaltyText}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById("dailyTotalAmount").innerText = `GHS${dailyTotal}`;
}

// Initial load
loadMembers();
</script>

</body>
</html>
