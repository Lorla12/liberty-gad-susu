<h2>Members 51-Week Table</h2>
<div id="membersContainer"></div>

<script>
const backendURL = "https://liberty-gad-susu-backend.gadesesamuel35.workers.dev";
const weeklyRate = 50;

async function loadMembers() {
  const res = await fetch(`${backendURL}/members`);
  const members = await res.json();

  const container = document.getElementById("membersContainer");
  container.innerHTML = "";

  members.forEach(member => {
    const table = document.createElement("table");
    table.border = "1";
    table.style.marginBottom = "20px";

    // Header row: Weeks 1 to 51
    let header = "<tr><th>Member ID: " + member.id + " | " + member.name + "</th>";
    for(let i=1;i<=51;i++){ header += "<th>"+i+"</th>"; }
    header += "</tr>";

    // Marks row
    let row = "<tr><td>Marks</td>";
    for(let i=1;i<=51;i++){
      const mark = member.weeklyMarks[i] || "×";
      row += `<td onclick="markWeek(${member.id}, ${i})" style="cursor:pointer">${mark}</td>`;
    }
    row += "</tr>";

    table.innerHTML = header + row;
    container.appendChild(table);
  });
}

async function markWeek(memberId, weekNumber){
  const weeks = prompt("How many weeks paid today?");
  if(!weeks || isNaN(weeks)) return;

  const res = await fetch(`${backendURL}/pay`, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ id: memberId, weeks: Number(weeks), weekNumber })
  });

  const data = await res.json();
  if(data.success){
    alert(`Payment recorded!\nMarks: ${data.mark}\nAmount: GHS${data.amount}\nG.Total: GHS${data.gTotal}${data.penalty ? "\nPenalty: No interest" : ""}`);
    loadMembers(); // refresh table
  }
}

// Initial load
loadMembers();
</script>
