<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liberty Gad Susu Enterprise</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  table { border-collapse: collapse; width: 100%; table-layout: fixed; }
  th, td { border: 1px solid #333; padding: 5px; text-align: center; font-size: 12px; }
  th { background: #eee; }
  td { cursor: pointer; }
  td:hover { background-color: #f0f0f0; }
  input, button { padding: 5px; margin: 2px; }
  .penalty { color: red; font-weight: bold; }
  .eligible { color: green; font-weight: bold; }
  #addMemberForm { margin-bottom: 10px; }
</style>
</head>
<body>
<h1>Liberty Gad Susu Enterprise - Collector Dashboard</h1>

<div id="addMemberForm">
  <input type="text" id="newName" placeholder="Member Name">
  <input type="text" id="newPhone" placeholder="Phone Number">
  <button onclick="addMember()">Add Member</button>
</div>

<table id="membersTable">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Phone</th>
      ${[...Array(51).keys()].map(i => `<th>W${i+1}</th>`).join("")}
      <th>Weeks Paid</th>
      <th>Amount Today</th>
      <th>G.Total</th>
      <th>Penalty</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="membersBody"></tbody>
</table>

<script>
const backendURL = "https://liberty-gad-susu-backend.gadesesamuel35.workers.dev";

// Load all members and render table
async function loadMembers() {
  const res = await fetch(`${backendURL}/members`);
  const members = await res.json();
  const tbody = document.getElementById("membersBody");
  tbody.innerHTML = "";

  members.forEach(member => {
    const weekCells = [];
    for (let i=1; i<=51; i++){
      const mark = member.weeklyMarks[i] || "";
      weekCells.push(`<td onclick="updateWeek(${member.id},${i})">${mark}</td>`);
    }

    tbody.innerHTML += `
      <tr>
        <td>${member.id}</td>
        <td>${member.name}</td>
        <td>${member.phone}</td>
        ${weekCells.join("")}
        <td>${member.weeksPaid}</td>
        <td>GHS${member.amountToday || 0}</td>
        <td>GHS${member.gTotal}</td>
        <td class="${member.penalty ? 'penalty':'eligible'}">
          ${member.penalty ? '❌ No interest' : '✅ Eligible'}
        </td>
        <td><button onclick="deleteMember('${member.name}')">Delete</button></td>
      </tr>
    `;
  });
}

// Add new member
async function addMember() {
  const name = document.getElementById("newName").value.trim();
  const phone = document.getElementById("newPhone").value.trim();
  if(!name || !phone) return alert("Name and phone required");

  await fetch(`${backendURL}/add-member`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({name, phone})
  });
  document.getElementById("newName").value = "";
  document.getElementById("newPhone").value = "";
  loadMembers();
}

// Delete member
async function deleteMember(name){
  if(!confirm(`Delete member ${name}?`)) return;
  await fetch(`${backendURL}/delete-member`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({name})
  });
  loadMembers();
}

// Handle week cell click
async function updateWeek(memberId, weekNumber){
  const marksCount = prompt("How many weeks paid for this week?");
  if(!marksCount) return;

  await fetch(`${backendURL}/pay-week`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ memberId, weekNumber, marksCount: Number(marksCount) })
  });

  loadMembers();
}

// Initial load
loadMembers();
</script>
</body>
</html>
