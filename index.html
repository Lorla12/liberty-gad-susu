<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liberty Gad Susu Enterprise - Collector Dashboard</title>
<style>
  /* ----- Global ----- */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
    color: #333;
  }
  h1, h2 {
    color: #2c3e50;
  }
  input, button {
    padding: 8px 12px;
    margin: 5px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 14px;
  }
  button {
    cursor: pointer;
    background: #3498db;
    color: #fff;
    border: none;
    transition: 0.2s;
  }
  button:hover { background: #2980b9; }

  /* ----- Cards ----- */
  .card {
    background: #fff;
    padding: 15px 20px;
    margin-bottom: 20px;
    border-radius: 8px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.05);
  }

  /* ----- Table ----- */
  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 3px 8px rgba(0,0,0,0.05);
  }
  th, td {
    padding: 10px 12px;
    text-align: center;
  }
  th {
    background: #2c3e50;
    color: #fff;
    position: sticky;
    top: 0;
  }
  tr:nth-child(even) { background: #f9f9f9; }
  tr:hover { background: #eaf3ff; }

  .badge { 
    display:inline-block; 
    padding: 2px 6px; 
    border-radius: 4px; 
    font-size: 12px;
    font-weight: bold;
  }
  .eligible { background:#2ecc71; color:white; }
  .penalty { background:#e74c3c; color:white; }
  .daily-total { background:#f39c12; color:white; font-weight:bold; }

  @media(max-width:768px){
    table, thead, tbody, th, td, tr { display:block; }
    th { text-align:left; }
    tr { margin-bottom:10px; }
    td { text-align:left; padding-left:50%; position:relative; }
    td::before {
      content: attr(data-label);
      position:absolute;
      left:10px;
      font-weight:bold;
    }
  }
</style>
</head>
<body>

<h1>Liberty Gad Susu Enterprise</h1>
<h2>Collector Dashboard</h2>

<!-- ===== Add Member Card ===== -->
<div class="card">
  <h3>Add New Member</h3>
  <input id="newMemberId" placeholder="ID Number">
  <input id="newMemberName" placeholder="Member Name">
  <input id="newMemberPhone" placeholder="Phone Number">
  <input id="newMemberRate" type="number" placeholder="Weekly Contribution (GHS)">
  <button onclick="addMember()">Add Member</button>
</div>

<!-- ===== Search Card ===== -->
<div class="card">
  <h3>Search Members</h3>
  <input id="searchQuery" placeholder="Search by ID, Name or Phone" oninput="loadMembers()">
</div>

<!-- ===== Record Payment Card ===== -->
<div class="card">
  <h3>Record Payment</h3>
  <input id="memberId" placeholder="Member ID">
  <input id="weeks" type="number" placeholder="Weeks Paid">
  <button onclick="recordPayment()">Record Payment</button>
  <div id="result" style="margin-top:10px;"></div>
</div>

<!-- ===== Members Table ===== -->
<div class="card">
  <h3>All Members</h3>
  <table id="membersTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Phone</th>
        <th>Weekly Rate (GHS)</th>
        <th>Weeks Paid</th>
        <th>Weekly Marks</th>
        <th>Amount Today</th>
        <th>G.Total</th>
        <th>Penalty</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
    <tfoot>
      <tr class="daily-total">
        <td colspan="6">Daily Total</td>
        <td id="dailyTotalAmount">0</td>
        <td colspan="3"></td>
      </tr>
    </tfoot>
  </table>
</div>

<script>
const backendURL = "https://liberty-gad-susu-backend.gadesesamuel35.workers.dev";

// ----- Add Member -----
async function addMember() {
  const id = document.getElementById("newMemberId").value.trim();
  const name = document.getElementById("newMemberName").value.trim();
  const phone = document.getElementById("newMemberPhone").value.trim();
  const weeklyRate = Number(document.getElementById("newMemberRate").value);

  if(!id || !name || !phone || !weeklyRate){ alert("Fill all fields!"); return; }

  const res = await fetch(`${backendURL}/add-member`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ id, name, phone, weeklyRate })
  });
  const data = await res.json();
  if(data.success){
    alert("Member added successfully!");
    document.getElementById("newMemberId").value = "";
    document.getElementById("newMemberName").value = "";
    document.getElementById("newMemberPhone").value = "";
    document.getElementById("newMemberRate").value = "";
    loadMembers();
  } else {
    alert(data.message);
  }
}

// ----- Delete Member -----
async function deleteMember(id){
  if(!confirm(`Delete member ${id}?`)) return;
  const res = await fetch(`${backendURL}/delete-member`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ id })
  });
  const data = await res.json();
  if(data.success) loadMembers();
}

// ----- Record Payment -----
async function recordPayment() {
  const id = document.getElementById("memberId").value.trim();
  const weeks = Number(document.getElementById("weeks").value);
  if(!id || !weeks){ alert("Fill all fields!"); return; }

  const res = await fetch(`${backendURL}/pay`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ id, weeks })
  });
  const data = await res.json();
  if(!data.success){ alert(data.message); return; }

  document.getElementById("result").innerHTML = `
    <strong>Payment Recorded ✅</strong><br>
    Marks Today: ${data.mark}<br>
    Amount Today: GHS${data.amount}<br>
    G.Total: GHS${data.gTotal}<br>
    ${data.penalty ? '<span class="badge penalty">❌ No interest</span>' : '<span class="badge eligible">✅ Eligible</span>'}
  `;
  loadMembers();
}

// ----- Load Members -----
async function loadMembers() {
  const searchQuery = document.getElementById("searchQuery").value.toLowerCase();
  const res = await fetch(`${backendURL}/members`);
  const members = await res.json();

  const tbody = document.querySelector("#membersTable tbody");
  tbody.innerHTML = "";
  let dailyTotal = 0;

  members.filter(m => m.id.toLowerCase().includes(searchQuery) 
                     || m.name.toLowerCase().includes(searchQuery) 
                     || m.phone.includes(searchQuery)).forEach(m=>{
    const weeklyMarks = Object.entries(m.weeklyMarks||{})
                              .sort((a,b)=>a[0]-b[0])
                              .map(w=>`W${w[0]}:${w[1]}`).join(" | ");

    const weekNumbers = Object.keys(m.weeklyMarks||{}).map(Number);
    let amountToday = 0;
    if(weekNumbers.length>0){
      const lastWeek = Math.max(...weekNumbers);
      amountToday = m.weeklyMarks[lastWeek].length * m.weeklyRate;
    }
    dailyTotal += amountToday;

    const weekNumber = Math.floor((new Date().getTime()-new Date("2026-01-03").getTime())/(7*24*60*60*1000))+1;
    const missedWeeks = weekNumber - m.weeksPaid;
    const penaltyText = missedWeeks>=5 ? '<span class="badge penalty">❌ No interest</span>' : '<span class="badge eligible">✅ Eligible</span>';

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td data-label="ID">${m.id}</td>
      <td data-label="Name">${m.name}</td>
      <td data-label="Phone">${m.phone}</td>
      <td data-label="Weekly Rate">GHS${m.weeklyRate}</td>
      <td data-label="Weeks Paid">${m.weeksPaid}</td>
      <td data-label="Weekly Marks">${weeklyMarks}</td>
      <td data-label="Amount Today">GHS${amountToday}</td>
      <td data-label="G.Total">GHS${m.gTotal}</td>
      <td data-label="Penalty">${penaltyText}</td>
      <td data-label="Actions"><button onclick="deleteMember('${m.id}')">Delete</button></td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById("dailyTotalAmount").innerText = `GHS${dailyTotal}`;
}

// ----- Initial Load -----
loadMembers();
</script>

</body>
</html>
