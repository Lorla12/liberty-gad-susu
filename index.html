<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liberty Gad Susu Enterprise</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  .member-card { border: 1px solid #333; padding: 10px; margin-bottom: 20px; }
  table { border-collapse: collapse; width: 100%; table-layout: fixed; margin-top: 5px; }
  th, td { border: 1px solid #333; padding: 5px; text-align: center; font-size: 12px; }
  th { background: #eee; }
  td { cursor: pointer; }
  td:hover { background-color: #f0f0f0; }
  .penalty { color: red; font-weight: bold; }
  .eligible { color: green; font-weight: bold; }
  input, button { padding: 5px; margin: 2px; }
</style>
</head>
<body>
<h1>Liberty Gad Susu Enterprise - Collector Dashboard</h1>

<div id="addMemberForm">
  <input type="text" id="newName" placeholder="Member Name">
  <input type="text" id="newPhone" placeholder="Phone Number">
  <button onclick="addMember()">Add Member</button>
</div>

<div id="membersContainer"></div>

<script>
const backendURL = "https://liberty-gad-susu-backend.gadesesamuel35.workers.dev";

async function loadMembers() {
  const res = await fetch(`${backendURL}/members`);
  const members = await res.json();
  const container = document.getElementById("membersContainer");
  container.innerHTML = "";

  members.forEach(member => {
    const weekCells = [];
    for (let i=1; i<=51; i++){
      const mark = member.weeklyMarks[i] || "";
      weekCells.push(`<td onclick="updateWeek(${member.id},${i})">${mark}</td>`);
    }

    container.innerHTML += `
      <div class="member-card">
        <strong>Member Name:</strong> ${member.name} &nbsp; 
        <strong>Phone:</strong> ${member.phone} &nbsp;
        <strong>ID:</strong> ${member.id} <br>
        <strong>Weeks Paid:</strong> ${member.weeksPaid} &nbsp;
        <strong>Amount Today:</strong> GHS${member.amountToday || 0} &nbsp;
        <strong>G.Total:</strong> GHS${member.gTotal} &nbsp;
        <strong>Penalty:</strong> <span class="${member.penalty?'penalty':'eligible'}">
          ${member.penalty ? '❌ No interest':'✅ Eligible'}</span>
        <button onclick="deleteMember('${member.name}')">Delete</button>

        <table>
          <thead>
            <tr>${[...Array(51).keys()].map(i=>`<th>W${i+1}</th>`).join("")}</tr>
          </thead>
          <tbody>
            <tr>${weekCells.join("")}</tr>
          </tbody>
        </table>
      </div>
    `;
  });
}

// Add new member
async function addMember() {
  const name = document.getElementById("newName").value.trim();
  const phone = document.getElementById("newPhone").value.trim();
  if(!name || !phone) return alert("Name and phone required");

  await fetch(`${backendURL}/add-member`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({name, phone})
  });
  document.getElementById("newName").value = "";
  document.getElementById("newPhone").value = "";
  loadMembers();
}

// Delete member
async function deleteMember(name){
  if(!confirm(`Delete member ${name}?`)) return;
  await fetch(`${backendURL}/delete-member`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({name})
  });
  loadMembers();
}

// Handle week cell click
async function updateWeek(memberId, weekNumber){
  const marksCount = prompt("How many weeks paid for this week?");
  if(!marksCount) return;

  await fetch(`${backendURL}/pay-week`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ memberId, weekNumber, marksCount: Number(marksCount) })
  });

  loadMembers();
}

// Initial load
loadMembers();
</script>
</body>
</html>
